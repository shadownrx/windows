# NEX Music server on Fly.io
# Deploy from repo root:
#   fly launch --config server/fly.toml --dockerfile server/Dockerfile --path server
# Or from server/:
#   cd server && fly launch

app = 'nex-music-anex'  # change if taken
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '4000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
